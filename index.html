<style>

/* ================= ROMANTIC TEXT (SOFT PINK MOTHER’S DAY) ================= */
.title {
  position: absolute;
  top: 60px; /* moved slightly down */
  width: 100%;
  text-align: center;
  font-family: 'Great Vibes', cursive;
  font-size: 65px;
  color: #ffb6e6;
  z-index: 9999;
  text-shadow: 0 0 15px #ffb6e6, 0 0 30px #ff77cc;
  animation: titleGlow 3s ease-in-out infinite, floatTitle 4s ease-in-out infinite;
}

@keyframes titleGlow {
  0%, 100% {
    text-shadow: 0 0 10px #ffb6e6, 0 0 20px #ff77cc;
    color: #ffb6e6;
  }
  50% {
    text-shadow: 0 0 25px #ffb6e6, 0 0 45px #ff77cc;
    color: #ffd1f2;
  }
}

@keyframes floatTitle {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* ================= HEARTS (LIGHT PINK FLOATING) ================= */
.hearts {
  position: absolute;
  width: 100%;
  height: 100%;
  overflow: hidden;
  z-index: 5;
  pointer-events: none;
}

.heart {
  position: absolute;
  bottom: -20px;
  color: #ffc1e3; /* light pink hearts */
  font-size: 22px;
  animation: floatUp 5s ease-in-out infinite;
  opacity: 0.9;
  text-shadow: 0 0 8px #ffc1e3, 0 0 15px #ff9ad5;
}

.heart:nth-child(1){left:10%;animation-delay:0s;}
.heart:nth-child(2){left:25%;animation-delay:1s;}
.heart:nth-child(3){left:40%;animation-delay:2s;}
.heart:nth-child(4){left:65%;animation-delay:3s;}
.heart:nth-child(5){left:80%;animation-delay:4s;}

@keyframes floatUp {
  0%   {transform: translateY(0) scale(1); opacity:0.9;}
  50%  {opacity:1;}
  100% {transform: translateY(-110vh) scale(1.6); opacity:0;}
}

/* ================= FLOWERS UNTOUCHED ================= */
@media (max-width: 600px) {

  .flowers {
    transform: scale(0.75);
    transform-origin: bottom center;
    bottom: 20px;
  }

  .title {
    font-size: 42px;
    top: 40px;
  }

  .subtitle {
    font-size: 20px;
  }

  .night {
    height: 100vh;
    overflow: hidden;
  }
}
</style>

</head>
